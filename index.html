<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ReportRadar delivers the latest news on World, Tech, and more.">
  <meta name="keywords" content="news, world, technology, breaking news">
  <meta name="author" content="Rex J. Kapoloma">
  <title>ReportRadar - Home</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/webp" href="images/favicon.webp">
</head>
<body>
  <header>
    <div class="menu-toggle">
      <button class="hamburger" aria-label="Toggle menu" aria-expanded="false">☰</button>
    </div>
    <div class="logo">
      <span class="logo-box">ReportRadar</span>
    </div>
    <div class="weather">
      <span class="weather-time">03:02 AM</span>
      <span class="weather-temp">18°C</span>
      <span class="weather-icon">🌙</span>
    </div>
    <button class="mode-toggle" aria-label="Toggle dark/light mode">🌙</button>
    <nav class="nav-menu" aria-label="Primary navigation">
      <a href="index.html" aria-current="page">Home</a>
      <a href="world.html">World</a>
      <a href="tech.html">Tech</a>
      <a href="about.html">About</a>
      <a href="contact.html" aria-current="page">Contact</a>
      <a href="dashboard.html" aria-current="page">Dashboard</a>
      <a href="admin.html" aria-current="page">Login</a>
    </nav>
  </header>
  <main>
    <section id="featured-news" aria-labelledby="featured-news-heading">
      <h1 id="featured-news-heading">Featured News</h1>
      <div id="news-container" class="news-grid"></div>
    </section>
    <section id="newsletter" aria-labelledby="newsletter-heading">
      <h2 id="newsletter-heading">Subscribe to Our Newsletter</h2>
      <form id="newsletter-form">
        <label for="email-sub">Email:</label>
        <input type="email" id="email-sub" required aria-required="true" placeholder="Enter your email">
        <button type="submit">Subscribe</button>
      </form>
      <div id="newsletter-message" aria-live="polite"></div>
    </section>
  </main>
  <footer>
    <p>© 2025 ReportRadar</p>
    <a href="https://github.com/yourusername/reportradar" target="_blank">GitHub</a>
  </footer>
  <script src="js/script.js"></script>
</body>
</html>
