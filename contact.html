<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Contact ReportRadar for feedback or news tips.">
  <meta name="keywords" content="contact, ReportRadar, feedback">
  <meta name="author" content="Rex J. Kapoloma">
  <title>ReportRadar - Contact</title>
  <link rel="stylesheet" href="css/base.css">
<link rel="stylesheet" href="css/larger.css" media="(min-width: 769px)">
</head>
<body>
  <header>
    <div class="logo">
      <img src="images/logo.png" alt="ReportRadar logo" loading="lazy">
      <span class="tagline">Stay Ahead with Real-Time Reporting</span>
    </div>
    <div class="menu-toggle">
      <button class="hamburger" aria-label="Toggle menu" aria-expanded="false">☰</button>
      <button class="search-toggle" aria-label="Toggle search" aria-expanded="false">🔍</button>
    </div>
    <nav class="nav-menu" aria-label="Primary navigation">
      <a href="index.html">Home</a>
      <a href="world.html">World</a>
      <a href="tech.html">Tech</a>
      <a href="about.html">About</a>
      <a href="contact.html" aria-current="page">Contact</a>
    </nav>
    <div class="search-container">
      <label for="search-bar" class="visually-hidden">Search articles</label>
      <input type="search" id="search-bar" placeholder="Search articles..." aria-label="Search articles">
    </div>
  </header>
  <main>
    <section id="contact" aria-labelledby="contact-heading">
      <h1 id="contact-heading">Contact Us</h1>
      <form id="contact-form">
        <div class="form-group">
          <label for="submission-type">Submission Type:</label>
          <select id="submission-type" required aria-required="true">
            <option value="" disabled selected>Select type</option>
            <option value="feedback">Feedback</option>
            <option value="news-tip">News Tip</option>
            <option value="article-submission">Article Submission</option>
          </select>
        </div>
        <div class="form-group">
          <label for="name">Name:</label>
          <input type="text" id="name" required aria-required="true">
        </div>
        <div class="form-group">
          <label for="email">Email:</label>
          <input type="email" id="email" required aria-required="true">
        </div>
        <div class="form-group">
          <label for="message">Message/News Tip/Article:</label>
          <textarea id="message" required aria-required="true"></textarea>
        </div>
        <button type="submit">Submit</button>
      </form>
      <div id="form-message" aria-live="polite"></div>
    </section>
    <section id="search-results" aria-live="polite"></section>
  </main>
  <footer>
    <p>© 2025 ReportRadar</p>
    <a href="references.html">References</a>
  </footer>
  <script src="js/script.js"></script>
</body>
</html>
